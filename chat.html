<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pyro AI — App</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SYSTEM_PROMPT = `You are Pyro, a witty and energetic AI assistant with a fiery personality. You're helpful, enthusiastic, and occasionally use fire/flame metaphors naturally. Keep responses concise and engaging. You speak in a friendly, warm tone — like a knowledgeable friend who's always fired up to help. When analyzing images or videos, be detailed, insightful and enthusiastic about what you see.`;

    const STYLES = [
      { id: "realistic",   label: "Realistic",   icon: "📷" },
      { id: "anime",       label: "Anime",        icon: "🎌" },
      { id: "digital-art", label: "Digital Art",  icon: "🖌️" },
      { id: "oil-painting",label: "Oil Painting", icon: "🎨" },
      { id: "3d-render",   label: "3D Render",    icon: "💎" },
      { id: "pixel-art",   label: "Pixel Art",    icon: "👾" },
    ];
    const ASPECTS = [
      { id: "square",    label: "1:1",  w: 1024, h: 1024 },
      { id: "landscape", label: "16:9", w: 1280, h: 720  },
      { id: "portrait",  label: "9:16", w: 720,  h: 1280 },
    ];
    const VIDEO_STYLES = [
      { id: "cinematic", label: "Cinematic", icon: "🎬" },
      { id: "anime",     label: "Anime",     icon: "🎌" },
      { id: "realistic", label: "Realistic", icon: "📷" },
      { id: "cartoon",   label: "Cartoon",   icon: "✏️" },
      { id: "3d",        label: "3D Render", icon: "💎" },
      { id: "abstract",  label: "Abstract",  icon: "🌀" },
    ];
    const VIDEO_DURATIONS = [
      { id: "3", label: "3 sec" },
      { id: "5", label: "5 sec" },
      { id: "8", label: "8 sec" },
    ];

    const fileToBase64 = (file) =>
      new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

    const extractVideoFrame = (videoFile, timeSeconds = 1) =>
      new Promise((resolve, reject) => {
        const video = document.createElement("video");
        const url = URL.createObjectURL(videoFile);
        video.src = url; video.crossOrigin = "anonymous"; video.muted = true;
        video.addEventListener("loadedmetadata", () => {
          video.currentTime = Math.min(timeSeconds, video.duration * 0.3);
        });
        video.addEventListener("seeked", () => {
          const canvas = document.createElement("canvas");
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 360;
          canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
          const base64 = canvas.toDataURL("image/jpeg", 0.85).split(",")[1];
          URL.revokeObjectURL(url);
          resolve({ base64, duration: video.duration });
        });
        video.addEventListener("error", () => { URL.revokeObjectURL(url); reject(new Error("fail")); });
        video.load();
      });

    const TypingDots = () => (
      <div style={{ display:"flex", gap:"5px", alignItems:"center", padding:"4px 0" }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ width:8, height:8, borderRadius:"50%", background:"linear-gradient(135deg,#FF6B35,#FFD700)", animation:`bounce 1.2s ease-in-out ${i*0.2}s infinite` }} />
        ))}
      </div>
    );

    function App() {
      const [activeTab, setActiveTab] = useState("chat");

      // ── Chat state ──
      const [messages, setMessages] = useState([
        { role:"assistant", content:"Hey! I'm Pyro 🔥 Chat with me, share an image or video for analysis, generate images, or create AI videos!\n\n📎 Attach any image/video using the button below — I'll analyze it for you!" }
      ]);
      const [input,        setInput]        = useState("");
      const [loading,      setLoading]      = useState(false);
      const [attachedFile, setAttachedFile] = useState(null);
      const [isDragging,   setIsDragging]   = useState(false);
      const bottomRef  = useRef(null);
      const inputRef   = useRef(null);
      const fileInputRef = useRef(null);

      // ── Image gen state ──
      const [imgPrompt,        setImgPrompt]        = useState("");
      const [imgStyle,         setImgStyle]          = useState("realistic");
      const [imgAspect,        setImgAspect]         = useState("square");
      const [generatedImages,  setGeneratedImages]   = useState([]);
      const [currentImg,       setCurrentImg]        = useState(null);
      const [imgLoading,       setImgLoading]        = useState(false);

      // ── Video gen state ──
      const [vidPrompt,   setVidPrompt]   = useState("");
      const [vidStyle,    setVidStyle]    = useState("cinematic");
      const [vidDuration, setVidDuration] = useState("5");
      const [videoUrl,    setVideoUrl]    = useState(null);
      const [vidLoading,  setVidLoading]  = useState(false);
      const [vidError,    setVidError]    = useState("");
      const [vidHistory,  setVidHistory]  = useState([]);
      const [vidProgress, setVidProgress] = useState(0);
      const progressRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);

      // ── File handling ──
      const handleFileSelect = async (file) => {
        if (!file) return;
        const isImage = file.type.startsWith("image/");
        const isVideo = file.type.startsWith("video/");
        if (!isImage && !isVideo) { alert("Only images and videos supported!"); return; }
        const previewUrl = URL.createObjectURL(file);
        if (isImage) {
          const base64 = await fileToBase64(file);
          setAttachedFile({ type:"image", name:file.name, base64, mediaType:file.type, previewUrl });
        } else {
          try {
            const { base64, duration } = await extractVideoFrame(file, 1);
            setAttachedFile({ type:"video", name:file.name, base64, mediaType:"image/jpeg", previewUrl, duration:Math.round(duration) });
          } catch { alert("Could not read video. Try MP4 format."); }
        }
      };

      const removeAttachment = () => {
        if (attachedFile?.previewUrl) URL.revokeObjectURL(attachedFile.previewUrl);
        setAttachedFile(null);
      };

      // ── Send message ──
      const sendMessage = async () => {
        const text = input.trim();
        if ((!text && !attachedFile) || loading) return;
        const displayText = text || (attachedFile?.type==="image" ? "Analyze this image 🔥" : "Analyze this video 🔥");
        const userMsg = { role:"user", content:displayText, attachment: attachedFile ? { ...attachedFile } : null };

        let apiContent;
        if (attachedFile) {
          const imgBlock = { type:"image", source:{ type:"base64", media_type:attachedFile.mediaType, data:attachedFile.base64 } };
          let textStr = text || "Please analyze this in detail.";
          if (attachedFile.type === "video") {
            textStr = `[Frame extracted from video: "${attachedFile.name}"${attachedFile.duration ? `, ~${attachedFile.duration}s long` : ""}. Analyze what you see.]\n\n${text || "Analyze this video frame."}`;
          }
          apiContent = [imgBlock, { type:"text", text:textStr }];
        } else {
          apiContent = text;
        }

        const apiHistory = [...messages.map(m => ({ role:m.role, content:m.content })), { role:"user", content:apiContent }];
        setMessages(prev => [...prev, userMsg]);
        setInput(""); setAttachedFile(null); setLoading(true);

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type":"application/json" },
            body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:apiHistory }),
          });
          const data = await res.json();
          setMessages(prev => [...prev, { role:"assistant", content:data.content?.[0]?.text || "Something went wrong!" }]);
        } catch {
          setMessages(prev => [...prev, { role:"assistant", content:"Oops! The fire went out. Try again 🔥" }]);
        } finally { setLoading(false); inputRef.current?.focus(); }
      };

      const handleKey = (e) => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

      // ── Image generation ──
      const generateImage = () => {
        if (!imgPrompt.trim() || imgLoading) return;
        setImgLoading(true); setCurrentImg(null);
        const aspect = ASPECTS.find(a => a.id===imgAspect);
        const seed   = Math.floor(Math.random() * 99999);
        const url    = `https://image.pollinations.ai/prompt/${encodeURIComponent(`${imgPrompt}, ${imgStyle} style, high quality, 4k`)}?width=${aspect.w}&height=${aspect.h}&seed=${seed}&nologo=true`;
        const img    = new Image();
        img.onload  = () => { setCurrentImg(url); setGeneratedImages(prev => [{ url, prompt:imgPrompt, style:imgStyle, id:seed }, ...prev.slice(0,7)]); setImgLoading(false); };
        img.onerror = () => setImgLoading(false);
        img.src = url;
      };

      // ── Video generation ──
      const generateVideo = async () => {
        if (!vidPrompt.trim() || vidLoading) return;
        setVidLoading(true); setVideoUrl(null); setVidError(""); setVidProgress(0);
        let prog = 0;
        progressRef.current = setInterval(() => { prog += Math.random()*3; if (prog>92) prog=92; setVidProgress(prog); }, 400);
        try {
          const seed = Math.floor(Math.random() * 99999);
          const url  = `https://video.pollinations.ai/prompt/${encodeURIComponent(`${vidPrompt}, ${vidStyle} style, high quality`)}?seed=${seed}&duration=${vidDuration}&nologo=true`;
          const res  = await fetch(url);
          if (!res.ok) throw new Error("fail");
          const blob   = await res.blob();
          const objUrl = URL.createObjectURL(blob);
          clearInterval(progressRef.current); setVidProgress(100); setVideoUrl(objUrl);
          setVidHistory(prev => [{ url:objUrl, prompt:vidPrompt, style:vidStyle, id:seed }, ...prev.slice(0,4)]);
        } catch {
          clearInterval(progressRef.current);
          setVidError("Video generation failed. Try a different prompt.");
        } finally { setVidLoading(false); }
      };

      const tabs    = [{ id:"chat", label:"Chat", icon:"💬" }, { id:"image", label:"Image AI", icon:"🖼️" }, { id:"video", label:"Video AI", icon:"🎬" }];
      const canSend = (input.trim() || attachedFile) && !loading;

      const S = {
        label: { color:"rgba(255,255,255,0.45)", fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8 },
        chip:  (active) => ({ padding:"7px 13px", borderRadius:10, border:`1px solid ${active?"#FF6B35":"rgba(255,255,255,0.1)"}`, background:active?"rgba(255,107,53,0.18)":"rgba(255,255,255,0.03)", color:active?"#FF6B35":"rgba(255,255,255,0.5)", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"'Sora',sans-serif", transition:"all 0.15s" }),
      };

      return (
        <div className="app-shell">
          <div className="chat-panel">

            {/* Drag overlay */}
            {isDragging && (
              <div style={{position:"absolute",inset:0,zIndex:100,background:"rgba(10,10,15,0.9)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,borderRadius:26,border:"2px dashed rgba(255,107,53,0.7)",backdropFilter:"blur(6px)"}}
                onDragOver={e=>e.preventDefault()} onDragLeave={()=>setIsDragging(false)}
                onDrop={e=>{e.preventDefault();setIsDragging(false);handleFileSelect(e.dataTransfer.files[0]);}}>
                <div style={{fontSize:52}}>📎</div>
                <div style={{color:"#FF6B35",fontWeight:700,fontSize:18}}>Drop image or video here</div>
                <div style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>Pyro will analyze it instantly 🔥</div>
              </div>
            )}

            {/* HEADER */}
            <div style={{padding:"14px 18px",background:"linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,215,0,0.04))",borderBottom:"1px solid rgba(255,107,53,0.13)",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
              <a href="index.html" className="back-btn" title="Back to home" style={{width:34,height:34,borderRadius:10,border:"1px solid rgba(255,107,53,0.2)",background:"rgba(255,255,255,0.04)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,transition:"all 0.2s",color:"rgba(255,255,255,0.5)",textDecoration:"none"}}>←</a>
              <div style={{width:44,height:44,borderRadius:13,background:"linear-gradient(135deg,#FF6B35,#FF3D00 50%,#FFD700)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,animation:"flicker 2.5s ease-in-out infinite",boxShadow:"0 4px 18px rgba(255,107,53,0.4)",flexShrink:0}}>🔥</div>
              <div>
                <div style={{color:"#FFF",fontWeight:700,fontSize:17,letterSpacing:"-0.3px"}}>Pyro</div>
                <div style={{color:"#FF6B35",fontSize:11,display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"#4ADE80",boxShadow:"0 0 6px #4ADE80"}} />
                  Chat · Image AI · Video AI · Vision
                </div>
              </div>
              <div style={{marginLeft:"auto",color:"rgba(255,255,255,0.18)",fontSize:11,fontFamily:"'Space Mono',monospace"}}>v3.1</div>
            </div>

            {/* TABS */}
            <div style={{display:"flex",gap:6,padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)",flexShrink:0,background:"rgba(0,0,0,0.25)"}}>
              {tabs.map(t => (
                <button key={t.id} className="tab-btn" onClick={()=>setActiveTab(t.id)}
                  style={{flex:1,padding:"9px 6px",borderRadius:12,border:"none",cursor:"pointer",background:activeTab===t.id?"linear-gradient(135deg,#FF6B35,#FF3D00)":"rgba(255,255,255,0.04)",color:activeTab===t.id?"#fff":"rgba(255,255,255,0.4)",fontSize:13,fontWeight:activeTab===t.id?700:500,fontFamily:"'Sora',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:activeTab===t.id?"0 3px 14px rgba(255,107,53,0.4)":"none",transition:"all 0.2s ease"}}>
                  <span>{t.icon}</span>{t.label}
                </button>
              ))}
            </div>

            {/* ── CHAT TAB ── */}
            {activeTab==="chat" && (<>
              <div style={{flex:1,overflowY:"auto",padding:"20px 16px",display:"flex",flexDirection:"column",gap:14}}
                onDragOver={e=>{e.preventDefault();setIsDragging(true);}}>
                {messages.map((msg, i) => (
                  <div key={i} className="msg-bubble" style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-end"}}>
                    {msg.role==="assistant" && <div style={{width:28,height:28,borderRadius:9,flexShrink:0,background:"linear-gradient(135deg,#FF6B35,#FFD700)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🔥</div>}
                    <div style={{maxWidth:"76%",display:"flex",flexDirection:"column",gap:6,alignItems:msg.role==="user"?"flex-end":"flex-start"}}>
                      {msg.attachment && (
                        <div style={{position:"relative",borderRadius:14,overflow:"hidden",border:"1px solid rgba(255,107,53,0.35)",maxWidth:200}}>
                          <img src={msg.attachment.previewUrl} alt="" style={{width:"100%",display:"block",maxHeight:150,objectFit:"cover"}} />
                          {msg.attachment.type==="video" && <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,107,53,0.85)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,paddingLeft:3}}>▶</div></div>}
                          <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.75))",padding:"5px 8px",fontSize:10,color:"rgba(255,255,255,0.85)",fontWeight:600}}>
                            {msg.attachment.type==="video"?"🎬":"🖼️"} {msg.attachment.name}{msg.attachment.duration?` · ${msg.attachment.duration}s`:""}
                          </div>
                        </div>
                      )}
                      <div style={{padding:"11px 15px",borderRadius:msg.role==="user"?"17px 17px 4px 17px":"17px 17px 17px 4px",background:msg.role==="user"?"linear-gradient(135deg,#FF6B35,#FF3D00)":"rgba(255,255,255,0.05)",border:msg.role==="user"?"none":"1px solid rgba(255,255,255,0.07)",color:"#fff",fontSize:14,lineHeight:1.65,wordBreak:"break-word",whiteSpace:"pre-wrap",boxShadow:msg.role==="user"?"0 4px 18px rgba(255,107,53,0.28)":"none"}}>
                        {msg.content}
                      </div>
                    </div>
                    {msg.role==="user" && <div style={{width:28,height:28,borderRadius:9,flexShrink:0,background:"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>👤</div>}
                  </div>
                ))}
                {loading && (
                  <div className="msg-bubble" style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                    <div style={{width:28,height:28,borderRadius:9,background:"linear-gradient(135deg,#FF6B35,#FFD700)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🔥</div>
                    <div style={{padding:"11px 16px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"17px 17px 17px 4px"}}><TypingDots /></div>
                  </div>
                )}
                <div ref={bottomRef} />
              </div>

              {/* Input area */}
              <div style={{padding:"10px 14px 12px",borderTop:"1px solid rgba(255,107,53,0.1)",background:"rgba(8,8,13,0.9)",flexShrink:0}}>
                {attachedFile && (
                  <div style={{marginBottom:8,padding:"8px 10px",borderRadius:12,background:"rgba(255,107,53,0.08)",border:"1px solid rgba(255,107,53,0.22)",display:"flex",alignItems:"center",gap:10,animation:"fadeUp 0.2s ease both"}}>
                    <div style={{width:44,height:44,borderRadius:9,overflow:"hidden",flexShrink:0,position:"relative"}}>
                      <img src={attachedFile.previewUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} />
                      {attachedFile.type==="video" && <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>▶</div>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:"#FF6B35",fontSize:12,fontWeight:700}}>{attachedFile.type==="video"?"🎬 Video":"🖼️ Image"} ready to analyze</div>
                      <div style={{color:"rgba(255,255,255,0.38)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{attachedFile.name}{attachedFile.duration?` · ${attachedFile.duration}s`:""}</div>
                    </div>
                    <button className="remove-btn" onClick={removeAttachment} style={{width:26,height:26,borderRadius:"50%",border:"none",background:"rgba(255,60,60,0.12)",color:"rgba(255,100,100,0.7)",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>✕</button>
                  </div>
                )}
                <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <input ref={fileInputRef} type="file" accept="image/*,video/*" onChange={e=>{handleFileSelect(e.target.files[0]);e.target.value="";}} style={{display:"none"}} />
                  <button className="attach-btn" onClick={()=>fileInputRef.current?.click()} title="Attach image or video"
                    style={{width:44,height:44,borderRadius:13,border:`1px solid ${attachedFile?"rgba(255,107,53,0.5)":"rgba(255,107,53,0.2)"}`,background:attachedFile?"rgba(255,107,53,0.15)":"rgba(255,255,255,0.04)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0,transition:"all 0.2s"}}>📎</button>
                  <div style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,107,53,0.18)",borderRadius:14,padding:"11px 14px"}}>
                    <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
                      placeholder={attachedFile?`Ask about this ${attachedFile.type}... 🔥`:"Ask anything, or drop an image/video 📎"}
                      rows={1} style={{width:"100%",background:"transparent",border:"none",color:"#fff",resize:"none",fontSize:14,fontFamily:"'Sora',sans-serif",lineHeight:1.5,maxHeight:110,overflowY:"auto"}}
                      onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,110)+"px";}} />
                  </div>
                  <button className="send-btn" onClick={sendMessage} disabled={!canSend}
                    style={{width:44,height:44,borderRadius:13,border:"none",background:canSend?"linear-gradient(135deg,#FF6B35,#FF3D00)":"rgba(255,255,255,0.06)",cursor:canSend?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:canSend?"0 3px 14px rgba(255,107,53,0.4)":"none",flexShrink:0}}>
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                </div>
                <div style={{marginTop:6,textAlign:"center"}}>
                  <span style={{color:"rgba(255,255,255,0.18)",fontSize:10}}>📎 Click attach or drag & drop · Images & Videos · Claude Vision AI</span>
                </div>
              </div>
            </>)}

            {/* ── IMAGE TAB ── */}
            {activeTab==="image" && (
              <div style={{flex:1,overflowY:"auto",padding:"18px 16px",display:"flex",flexDirection:"column",gap:16}}>
                <div><div style={S.label}>Prompt</div>
                  <input value={imgPrompt} onChange={e=>setImgPrompt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&generateImage()}
                    placeholder="e.g. A samurai in neon Tokyo rain..."
                    style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,107,53,0.2)",borderRadius:13,padding:"12px 15px",color:"#fff",fontSize:14,fontFamily:"'Sora',sans-serif"}} />
                </div>
                <div><div style={S.label}>Style</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                    {STYLES.map(s => <button key={s.id} className="style-chip" onClick={()=>setImgStyle(s.id)} style={S.chip(imgStyle===s.id)}>{s.icon} {s.label}</button>)}
                  </div>
                </div>
                <div><div style={S.label}>Aspect Ratio</div>
                  <div style={{display:"flex",gap:7}}>
                    {ASPECTS.map(a => <button key={a.id} className="style-chip" onClick={()=>setImgAspect(a.id)} style={{...S.chip(imgAspect===a.id),flex:1,padding:"8px"}}>{a.label}</button>)}
                  </div>
                </div>
                <button className="gen-btn" onClick={generateImage} disabled={!imgPrompt.trim()||imgLoading}
                  style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:imgPrompt.trim()&&!imgLoading?"linear-gradient(135deg,#FF6B35,#FF3D00)":"rgba(255,255,255,0.06)",color:"#fff",fontSize:15,fontWeight:700,cursor:imgPrompt.trim()&&!imgLoading?"pointer":"not-allowed",fontFamily:"'Sora',sans-serif",transition:"all 0.2s",boxShadow:imgPrompt.trim()&&!imgLoading?"0 4px 20px rgba(255,107,53,0.4)":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {imgLoading?(<><div style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Generating...</>):"🔥 Generate Image"}
                </button>
                {imgLoading && <div style={{width:"100%",borderRadius:16,minHeight:200,background:"linear-gradient(90deg,rgba(255,107,53,0.06) 25%,rgba(255,107,53,0.14) 50%,rgba(255,107,53,0.06) 75%)",backgroundSize:"600px 100%",animation:"shimmer 1.4s linear infinite",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid rgba(255,107,53,0.15)"}}><div style={{color:"rgba(255,107,53,0.6)",fontSize:13,fontWeight:600}}>✨ Firing up your image...</div></div>}
                {currentImg && !imgLoading && (
                  <div style={{animation:"fadeUp 0.4s ease both"}}>
                    <img src={currentImg} alt="Generated" style={{width:"100%",borderRadius:16,border:"1px solid rgba(255,107,53,0.22)",boxShadow:"0 8px 32px rgba(0,0,0,0.55)",display:"block"}} />
                    <div style={{display:"flex",gap:8,marginTop:10}}>
                      <a href={currentImg} download="pyro-image.jpg" target="_blank" rel="noreferrer" className="dl-btn" style={{flex:1,padding:"10px",borderRadius:11,background:"rgba(255,107,53,0.12)",border:"1px solid rgba(255,107,53,0.25)",color:"#FF6B35",fontSize:13,fontWeight:600,textAlign:"center",textDecoration:"none",transition:"all 0.15s",display:"block"}}>⬇️ Download</a>
                      <button onClick={generateImage} className="dl-btn" style={{flex:1,padding:"10px",borderRadius:11,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif",transition:"all 0.15s"}}>🔄 Regenerate</button>
                    </div>
                  </div>
                )}
                {generatedImages.length > 1 && (
                  <div><div style={{...S.label,marginBottom:10}}>History</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                      {generatedImages.slice(1).map(img => <img key={img.id} src={img.url} className="img-thumb" alt={img.prompt} onClick={()=>setCurrentImg(img.url)} style={{width:"100%",aspectRatio:"1/1",objectFit:"cover",borderRadius:10,cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",transition:"all 0.2s"}} />)}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── VIDEO TAB ── */}
            {activeTab==="video" && (
              <div style={{flex:1,overflowY:"auto",padding:"18px 16px",display:"flex",flexDirection:"column",gap:16}}>
                <div style={{padding:"12px 16px",borderRadius:13,background:"linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,215,0,0.04))",border:"1px solid rgba(255,107,53,0.2)",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>🎬</span>
                  <div><div style={{color:"#FF6B35",fontWeight:700,fontSize:13}}>Free AI Video Generator</div>
                    <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:2}}>Powered by Pollinations.ai · No signup needed</div>
                  </div>
                </div>
                <div><div style={S.label}>Video Prompt</div>
                  <textarea value={vidPrompt} onChange={e=>setVidPrompt(e.target.value)}
                    placeholder="e.g. A dragon flying over a burning castle at sunset..."
                    rows={3} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,107,53,0.2)",borderRadius:13,padding:"12px 15px",color:"#fff",fontSize:14,fontFamily:"'Sora',sans-serif",resize:"none",lineHeight:1.6}} />
                </div>
                <div><div style={S.label}>Style</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                    {VIDEO_STYLES.map(s => <button key={s.id} className="style-chip" onClick={()=>setVidStyle(s.id)} style={S.chip(vidStyle===s.id)}>{s.icon} {s.label}</button>)}
                  </div>
                </div>
                <div><div style={S.label}>Duration</div>
                  <div style={{display:"flex",gap:7}}>
                    {VIDEO_DURATIONS.map(d => <button key={d.id} className="style-chip" onClick={()=>setVidDuration(d.id)} style={{...S.chip(vidDuration===d.id),flex:1,padding:"8px"}}>{d.label}</button>)}
                  </div>
                </div>
                <button className="gen-btn" onClick={generateVideo} disabled={!vidPrompt.trim()||vidLoading}
                  style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:vidPrompt.trim()&&!vidLoading?"linear-gradient(135deg,#FF6B35,#FF3D00)":"rgba(255,255,255,0.06)",color:"#fff",fontSize:15,fontWeight:700,cursor:vidPrompt.trim()&&!vidLoading?"pointer":"not-allowed",fontFamily:"'Sora',sans-serif",transition:"all 0.2s",boxShadow:vidPrompt.trim()&&!vidLoading?"0 4px 20px rgba(255,107,53,0.4)":"none",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {vidLoading?(<><div style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Generating...</>):"🎬 Generate Video"}
                </button>
                {vidLoading && (
                  <div style={{animation:"fadeUp 0.3s ease both"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{color:"rgba(255,255,255,0.4)",fontSize:12}}>Rendering frames...</span>
                      <span style={{color:"#FF6B35",fontSize:12,fontWeight:600}}>{Math.round(vidProgress)}%</span>
                    </div>
                    <div style={{width:"100%",height:6,background:"rgba(255,255,255,0.07)",borderRadius:6,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:6,background:"linear-gradient(90deg,#FF6B35,#FFD700)",width:`${vidProgress}%`,transition:"width 0.4s ease",boxShadow:"0 0 10px rgba(255,107,53,0.6)"}} />
                    </div>
                    <div style={{marginTop:12,padding:"14px 16px",borderRadius:13,background:"rgba(255,107,53,0.06)",border:"1px solid rgba(255,107,53,0.15)",minHeight:100,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
                      <div style={{fontSize:28,animation:"pulse 1.5s ease-in-out infinite"}}>🎞️</div>
                      <div style={{color:"rgba(255,255,255,0.4)",fontSize:12,textAlign:"center"}}>AI is rendering...<br/><span style={{color:"rgba(255,107,53,0.6)",fontSize:11}}>30–60 seconds</span></div>
                    </div>
                  </div>
                )}
                {vidError && !vidLoading && <div style={{padding:"13px 16px",borderRadius:13,background:"rgba(255,50,50,0.08)",border:"1px solid rgba(255,50,50,0.25)",color:"rgba(255,100,100,0.9)",fontSize:13,display:"flex",alignItems:"center",gap:10}}><span>⚠️</span> {vidError}</div>}
                {videoUrl && !vidLoading && (
                  <div style={{animation:"fadeUp 0.4s ease both"}}>
                    <video src={videoUrl} controls autoPlay loop style={{width:"100%",borderRadius:16,display:"block",border:"1px solid rgba(255,107,53,0.22)",boxShadow:"0 8px 32px rgba(0,0,0,0.55)",background:"#000"}} />
                    <div style={{display:"flex",gap:8,marginTop:10}}>
                      <button onClick={()=>{const a=document.createElement("a");a.href=videoUrl;a.download="pyro-video.mp4";a.click();}} className="dl-btn" style={{flex:1,padding:"10px",borderRadius:11,background:"rgba(255,107,53,0.12)",border:"1px solid rgba(255,107,53,0.25)",color:"#FF6B35",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif",transition:"all 0.15s"}}>⬇️ Download</button>
                      <button onClick={generateVideo} className="dl-btn" style={{flex:1,padding:"10px",borderRadius:11,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.55)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Sora',sans-serif",transition:"all 0.15s"}}>🔄 Regenerate</button>
                    </div>
                  </div>
                )}
                {vidHistory.length > 1 && (
                  <div><div style={{...S.label,marginBottom:10}}>Recent Videos</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {vidHistory.slice(1).map(v => (
                        <div key={v.id} className="vid-card" style={{padding:"10px 14px",borderRadius:12,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setVideoUrl(v.url)}>
                          <div style={{width:36,height:36,borderRadius:9,flexShrink:0,background:"rgba(255,107,53,0.1)",border:"1px solid rgba(255,107,53,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🎬</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{color:"rgba(255,255,255,0.75)",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.prompt}</div>
                            <div style={{color:"rgba(255,107,53,0.6)",fontSize:11,marginTop:2}}>{v.style}</div>
                          </div>
                          <div style={{color:"rgba(255,255,255,0.3)",fontSize:11}}>▶</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
